name: "Bluetooth Speaker Manager"
description: "Connectez et gérez vos enceintes Bluetooth depuis Home Assistant"
version: "1.0.0"
slug: "bluetooth_speaker_manager"
init: false
arch:
  - aarch64
  - amd64
  - armv7
homeassistant_api: true
hassio_api: true
host_network: true
privileged:
  - NET_ADMIN
  - SYS_ADMIN
capabilities:
  - NET_ADMIN
  - SYS_ADMIN
full_access: true
apparmor: true
audio: true
ports:
  7880/tcp: 7880
ports_description:
  7880/tcp: "Interface Web Bluetooth Manager"
options:
  log_level: "info"
  auto_reconnect: true
  reconnect_delay: 30
  scan_timeout: 15
schema:
  log_level: "list(trace|debug|info|notice|warning|error|fatal)?"
  auto_reconnect: bool
  reconnect_delay: int(5,300)
  scan_timeout: int(5,60)
panel_icon: "mdi:bluetooth-audio"
panel_title: "BT Speaker"
panel_admin: false
url: "https://github.com/TON_USER/ha-bluetooth-speaker-manager"
build_from:
  aarch64: "ghcr.io/home-assistant/aarch64-base:3.18"
  amd64: "ghcr.io/home-assistant/amd64-base:3.18"
  armv7: "ghcr.io/home-assistant/armv7-base:3.18"
